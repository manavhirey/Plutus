services:
  # One-shot init: the app runs as non-root (uid 1654), but a fresh named volume
  # is root-owned. This grants the app ownership of the data dir before it starts.
  plutus-init:
    image: busybox
    command: sh -c "mkdir -p /data && chown -R 1654:1654 /data"
    volumes:
      - plutus-data:/data

  plutus:
    image: plutus:latest
    container_name: plutus
    restart: unless-stopped
    # Loopback-only publish so the host Caddy can reverse-proxy to the app and
    # terminate TLS for plutus.kunigami.cloud. Bound to 127.0.0.1 so the app is
    # never reachable unencrypted from outside the host.
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      plutus-init:
        condition: service_completed_successfully
    environment:
      # Required: your Anthropic API key for categorization.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # Optional: headless first-time SimpleFIN provisioning (single-use setup token).
      # Claimed on startup if no connection exists yet; ignored afterwards.
      - Plutus__SimpleFin__SetupToken=${SIMPLEFIN_SETUP_TOKEN:-}
      # Persist the SQLite DB and the Data Protection key ring onto the volume.
      - Plutus__Database__Path=/data/plutus.db
      - Plutus__DataProtectionKeysPath=/data/keys
      # One-off note backfill: set PLUTUS_BACKFILL_NOTES=true in .env to run once, then unset.
      - Plutus__Backfill__Notes=${PLUTUS_BACKFILL_NOTES:-false}
      # One-off transfer backfill: set PLUTUS_BACKFILL_TRANSFERS=true in .env to run once, then unset.
      - Plutus__Backfill__Transfers=${PLUTUS_BACKFILL_TRANSFERS:-false}
      # Optional overrides:
      # - Plutus__Sync__DailyTime=06:00
      # - Plutus__Claude__Model=claude-haiku-4-5
    volumes:
      - plutus-data:/data

volumes:
  plutus-data:
