# Traefik dynamic config (file provider). Routes the web entrypoint to the Plutus
# container by its compose DNS name. Avoids the Docker provider entirely — this
# host's Docker daemon enforces a minimum API version that Traefik's docker client
# can't satisfy.
http:
  routers:
    plutus:
      rule: "PathPrefix(`/`)"
      entryPoints:
        - web
      service: plutus
  services:
    plutus:
      loadBalancer:
        servers:
          - url: "http://plutus:8080"
